name: Trigger Skills Deploy

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  dispatch-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Trigger deploy via cli-anything-biddeed
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # cli-anything-biddeed has HETZNER_SSH_KEY + Telegram secrets
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/breverdbidder/cli-anything-biddeed/dispatches" \
            -d '{"event_type":"deploy-skills","client_payload":{"skill_name":"","source":"claude-skills-library"}}'
          echo "✅ Dispatched deploy-skills to cli-anything-biddeed"
