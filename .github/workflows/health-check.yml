name: Skills Health Check

on:
  schedule:
    - cron: '0 14 * * 0'  # Sundays 9AM EST (14:00 UTC)
  workflow_dispatch:

env:
  HETZNER_HOST: 87.99.129.125
  HETZNER_USER: root
  SKILLS_TARGET: /root/.claude/skills

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/hetzner
          chmod 600 ~/.ssh/hetzner
          ssh-keyscan -H ${{ env.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check skills on Hetzner
        id: check
        run: |
          SSH_CMD="ssh -i ~/.ssh/hetzner -o StrictHostKeyChecking=no ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }}"

          echo "=== Skills Inventory ==="
          REMOTE_SKILLS=$($SSH_CMD "find ${{ env.SKILLS_TARGET }}/ -maxdepth 2 \( -name 'SKILL.md' -o -name 'skill.md' \) -exec dirname {} \; 2>/dev/null | xargs -I{} basename {} | sort" 2>/dev/null || echo "")
          REPO_SKILLS=$(ls -d skills/*/ 2>/dev/null | xargs -I{} basename {} | sort)

          echo "Remote: $REMOTE_SKILLS"
          echo "Repo:   $REPO_SKILLS"

          # Find drift
          MISSING=""
          for skill in $REPO_SKILLS; do
            if ! echo "$REMOTE_SKILLS" | grep -q "^${skill}$"; then
              MISSING="$MISSING $skill"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "⚠️ DRIFT DETECTED — missing on Hetzner:$MISSING"
            echo "drift=true" >> $GITHUB_OUTPUT
            echo "missing=$MISSING" >> $GITHUB_OUTPUT
          else
            echo "✅ All skills in sync"
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-fix drift
        if: steps.check.outputs.drift == 'true'
        run: |
          SSH_CMD="ssh -i ~/.ssh/hetzner -o StrictHostKeyChecking=no ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }}"
          SCP_CMD="scp -i ~/.ssh/hetzner -o StrictHostKeyChecking=no -r"

          for skill in ${{ steps.check.outputs.missing }}; do
            echo "🔧 Deploying missing skill: $skill"
            $SCP_CMD skills/$skill ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }}:${{ env.SKILLS_TARGET }}/
          done
          echo "✅ Drift corrected"

      - name: Send Telegram notification
        if: always()
        run: |
          STATUS="${{ steps.check.outputs.drift == 'true' && '⚠️ DRIFT FIXED' || '✅ ALL SYNCED' }}"
          MSG="🧠 Skills Health Check $STATUS%0ASkills on Hetzner: $(echo '${{ steps.check.outputs.drift }}' | wc -w || echo 'OK')%0AMissing: ${{ steps.check.outputs.missing || 'none' }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" > /dev/null 2>&1 || true
